name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            django-version: 'Django~=4.2.0'
          - python-version: '3.11'
            django-version: 'Django~=4.2.0'
          - python-version: '3.12'
            django-version: 'Django~=4.2.0'
          - python-version: '3.10'
            django-version: 'Django~=5.2.0'
          - python-version: '3.11'
            django-version: 'Django~=5.2.0'
          - python-version: '3.12'
            django-version: 'Django~=5.2.0'
          - python-version: '3.13'
            django-version: 'Django~=5.2.0'
          - python-version: '3.14'
            django-version: 'Django~=5.2.0'

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync
        uv pip install --upgrade "${{ matrix.django-version }}"

    - name: Run tests
      run: |
        uv run flake8 .
        uv run mypy split_settings
        uv run pytest
        uv run doc8 -q docs
        uv lock --check
        uv pip check

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.xml
